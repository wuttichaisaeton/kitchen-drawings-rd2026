<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Mindmap Editor — A1 standalone</title>
  <style>
    @font-face {
      font-family: 'Flux Architect';
      src: url('fonts/Flux Architect Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Flux Architect';
      src: url('fonts/Flux Architect Bold.ttf') format('truetype');
      font-weight: 700;
    }
    html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
    #app { height: 100vh; }
  </style>
  <link rel="stylesheet" href="editor.bundle.css">
</head>
<body>
  <div id="app"></div>
  <script src="editor.bundle.js"></script>
  <script>
    // Standalone test mount — A2 will replace this with integration in main app.js.
    const params = new URLSearchParams(location.search);
    const projectKey = params.get('project') || 'demo-project';
    KitchenMindmapEditor.mount(document.getElementById('app'), {
      projectKey,
      initialNodes: [
        { id: 'demo-1', type: 'mindmap', position: { x: 250, y: 100 }, data: { label: 'Project root' } },
        { id: 'demo-2', type: 'mindmap', position: { x: 100, y: 250 }, data: { label: 'Cabinet A' } },
        { id: 'demo-3', type: 'mindmap', position: { x: 400, y: 250 }, data: { label: 'Cabinet B' } },
      ],
      initialEdges: [
        { id: 'e-demo-1-2', source: 'demo-1', target: 'demo-2' },
        { id: 'e-demo-1-3', source: 'demo-1', target: 'demo-3' },
      ],
      onChange: ({ nodes, edges }) => {
        // A3 will wire this to Firebase RTDB.
        console.log('[editor] change', { nodes: nodes.length, edges: edges.length });
      },
    });
  </script>
</body>
</html>
