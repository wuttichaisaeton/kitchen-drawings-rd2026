<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bend-punch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="bend-die" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="bend-workpiece" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="bend-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Centerline axis -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- V-Die (bottom) -->
  <path d="M 15 52 H 32 L 50 68 L 68 52 H 85 V 85 H 15 Z" fill="url(#bend-die)" stroke="#0f172a" stroke-width="2" stroke-linejoin="round" />
  <path d="M 15 52 H 32 L 50 68 L 68 52" fill="none" stroke="#64748b" stroke-width="1.5" />

  <!-- Sheet metal workpiece — glowing orange, bent in the die -->
  <path d="M 21 38 L 50 62 L 79 38" fill="none" stroke="url(#bend-workpiece)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#bend-glow)" />

  <!-- Press punch (top) -->
  <path d="M 38 12 H 62 V 47 L 50 59 L 38 47 Z" fill="url(#bend-punch)" stroke="#0f172a" stroke-width="2" stroke-linejoin="round" />
  <path d="M 39 13 H 61 V 46 L 50 57" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round" />

  <!-- Downward force arrow -->
  <path d="M 50 18 L 50 28 M 46 24 L 50 28 L 54 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
</svg>
