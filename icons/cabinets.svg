<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- tall cabinet (full height, left) = ตู้สูง -->
  <rect x="2.5" y="3" width="6" height="18" rx="0.6"/>
  <line x1="2.5" y1="12" x2="8.5" y2="12"/>
  <!-- upper / wall cabinet (top right) = ตู้บน -->
  <rect x="11" y="3" width="10.5" height="6" rx="0.6"/>
  <line x1="16.25" y1="3" x2="16.25" y2="9"/>
  <!-- base cabinet with top drawer (bottom right) = ตู้ล่าง -->
  <rect x="11" y="13" width="10.5" height="8" rx="0.6"/>
  <line x1="11" y1="16" x2="21.5" y2="16"/>
  <line x1="16.25" y1="16" x2="16.25" y2="21"/>
</svg>
