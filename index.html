<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <!-- Discourage caching of the app shell itself so a freshly deployed
       index.html is fetched on launch. Belt-and-suspenders with the
       network-first service worker below (sw.js). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- NO service worker. An earlier network-first SW pinned iOS PWAs to a
       stale build (iPhone stuck while iPad updated), so it was removed
       2026-05-29. This block actively tears down any SW + cache left on a
       device from that experiment, so the page always loads fresh. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
  </script>
  <!-- maximum-scale=1 + user-scalable=no: iPad PWA otherwise hijacks
       pinch gestures as page-level zoom, which beats React Flow to it
       and prevents the mindmap canvas from zooming. Workshop iPad never
       needs to zoom UI chrome; the editor handles its own zoom. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- iOS / iPad PWA-like fullscreen: when added to Home Screen,
       launching the icon hides the Safari toolbar and address bar. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kitchen">
  <meta name="theme-color" content="#0f172a">
  <title>Kitchen by Rough Design</title>
  <link rel="icon" type="image/svg+xml" href="icons/kitchen-drawings.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <!-- apple-touch-icon: 180 is iPhone Plus default; 167 is iPad Pro
       12.9"; 152 is older iPad. iOS picks the closest match. -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <!-- Cache-bust style.css per-minute so workshop iPads pick up CSS
       changes without needing a hard refresh. -->
  <script>
    (function() {
      var v = Math.floor(Date.now() / 60000);  // changes every 60s
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'style.css?v=' + v;
      document.head.appendChild(l);
      window.__KD_CACHE_V = v;
    })();
  </script>
  <!-- Apply the saved theme BEFORE paint to avoid a flash. Default = dark
       (the base stylesheet), so workshop devices are unaffected unless a
       user picks another theme. (2026-05-30 theme system) -->
  <script>
    (function () {
      try {
        document.documentElement.setAttribute('data-theme', localStorage.getItem('kd_theme_v1') || 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <!-- One-row header (2026-05-28 layout shrink): brand · Back · Tabs
         · Search · date · Admin/Role badges all share .header-row's
         flex line. The .header-controls wrapper uses display:contents
         so its children participate directly in the parent flex
         (keeps the existing CSS selectors like .header-controls .tabs
         working without restyling). -->
    <div class="header-row">
      <h1><span class="brand-icon" aria-hidden="true"></span>Kitchen <span class="brand-sub">by Rough Design</span></h1>
      <div class="header-controls">
        <button id="header-back-btn" class="back-btn" aria-label="Back" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="tabs">
          <button id="tab-projects" class="tab active" data-view="projects">📋 Projects</button>
          <button id="tab-library"  class="tab"        data-view="library">📦 Library</button>
          <button id="tab-nest"     class="tab"        data-view="nest">▶ Nest</button>
          <button id="tab-simbend"  class="tab"        data-view="simbend">🔩 Sim.Bending</button>
        </div>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button id="search-clear" type="button" aria-label="Clear">✕</button>
        </div>
      </div>
      <span id="updated" class="updated"></span>
      <button id="theme-btn" class="theme-btn" title="Theme" aria-label="Theme">🎨</button>
    </div>
  </header>

  <main id="root">
    <p class="loading">Loading…</p>
  </main>

  <footer>
    <span id="count"></span>
  </footer>

  <script src="config.js"></script>
  <script src="firebase-config.js"></script>
  <!-- Firebase Realtime Database (compat SDK from CDN) — shared metadata + comments. -->
  <!-- Storage SDK intentionally absent: this project is on the Spark plan -->
  <!-- and uploads route through the GitHub Contents API instead. -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <!-- Sortable.js — touch-friendly drag-and-drop for project reordering -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <!-- pdf-lib — client-side PDF merging for the "All PDF" button on
       each project (merges every part's drawing into one navigable PDF
       with a clickable link back to each part's spoke). -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script>
    if (window.firebase && window.FIREBASE_CONFIG) {
      try {
        firebase.initializeApp(window.FIREBASE_CONFIG);
        window.firebaseDB = firebase.database();
      } catch (e) {
        console.warn('Firebase init failed:', e);
      }
    }
  </script>
  <!-- Theme picker: 🎨 header button -> menu of themes. Self-contained,
       independent of app.js render() (header is static), persists per
       device. Add a theme = one THEMES entry + a html[data-theme="x"]
       block in style.css. (2026-05-30) -->
  <script>
    (function () {
      var THEMES = [
        { id: 'dark',     label: 'Default - Dark' },
        { id: 'sketch',   label: 'Sketch - pencil' },
        { id: 'chalk',    label: 'Chalkboard - chalk' },
        { id: 'obsidian', label: 'Obsidian Gold - luxury' }
      ];
      var KEY = 'kd_theme_v1';
      function cur() { try { return localStorage.getItem(KEY) || 'dark'; } catch (e) { return 'dark'; } }
      function apply(id) {
        document.documentElement.setAttribute('data-theme', id);
        try { localStorage.setItem(KEY, id); } catch (e) {}
      }
      var btn = document.getElementById('theme-btn');
      if (!btn) return;
      var menu = null;
      function close() {
        if (menu) { menu.remove(); menu = null; document.removeEventListener('click', onDoc, true); }
      }
      function onDoc(e) { if (menu && !menu.contains(e.target) && e.target !== btn) close(); }
      function open() {
        close();
        var c = cur();
        menu = document.createElement('div');
        menu.className = 'theme-menu';
        THEMES.forEach(function (t) {
          var o = document.createElement('button');
          o.className = 'theme-opt' + (t.id === c ? ' is-active' : '');
          o.textContent = (t.id === c ? '✓ ' : ' ') + t.label;
          o.addEventListener('click', function () { apply(t.id); close(); });
          menu.appendChild(o);
        });
        document.body.appendChild(menu);
        var r = btn.getBoundingClientRect();
        menu.style.position = 'fixed';
        menu.style.top = (r.bottom + 6) + 'px';
        // Anchor the menu's LEFT edge to the button and clamp it inside the
        // viewport. The 🎨 button sits on the left of the header row, so the
        // old right-anchor (right = innerWidth - r.right) pushed the ~190px
        // menu off the left edge of the screen (เอ๋ 2026-06-01 'มองไม่เห็น
        // ในจอ'). offsetWidth is valid now the menu is in the DOM.
        var mw = menu.offsetWidth || 190;
        var left = Math.min(r.left, window.innerWidth - mw - 8);
        menu.style.left = Math.max(8, left) + 'px';
        setTimeout(function () { document.addEventListener('click', onDoc, true); }, 0);
      }
      btn.addEventListener('click', function (e) { e.stopPropagation(); if (menu) close(); else open(); });
    })();
  </script>
  <!-- app.js + nest.js cache-busted per-minute (shared bucket with
       style.css). nest.js loads BEFORE app.js so app.js can hand off
       to kdNest.openProject(projectKey) when the Nesting button is hit. -->
  <script>
    (function() {
      var v = window.__KD_CACHE_V || Math.floor(Date.now() / 60000);
      ['nest.js', 'app.js'].forEach(function(name) {
        var s = document.createElement('script');
        s.src = name + '?v=' + v;
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>
