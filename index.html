<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <!-- Discourage caching of the app shell itself so a freshly deployed
       index.html is fetched on launch. Belt-and-suspenders with the
       network-first service worker below (sw.js). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Link previews (LINE / Facebook / Twitter): branded card instead of the
       "image could not be loaded" blank (เอ๋ 2026-06-09). og-image.png is
       generated brand art (ink/steel/amber, Flux) — 1200x630. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Kitchen by Rough Design">
  <meta property="og:title" content="Kitchen by Rough Design">
  <meta property="og:description" content="Workshop drawings, nesting and bending — Rough Design stainless kitchen.">
  <meta property="og:url" content="https://wuttichaisaeton.github.io/kitchen-drawings-rd2026/">
  <meta property="og:image" content="https://wuttichaisaeton.github.io/kitchen-drawings-rd2026/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://wuttichaisaeton.github.io/kitchen-drawings-rd2026/og-image.png">
  <!-- NO service worker. An earlier network-first SW pinned iOS PWAs to a
       stale build (iPhone stuck while iPad updated), so it was removed
       2026-05-29. This block actively tears down any SW + cache left on a
       device from that experiment, so the page always loads fresh. -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
  </script>
  <!-- maximum-scale=1 + user-scalable=no: iPad PWA otherwise hijacks
       pinch gestures as page-level zoom, which beats React Flow to it
       and prevents the mindmap canvas from zooming. Workshop iPad never
       needs to zoom UI chrome; the editor handles its own zoom. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- iOS / iPad PWA-like fullscreen: when added to Home Screen,
       launching the icon hides the Safari toolbar and address bar. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kitchen">
  <meta name="theme-color" content="#0f172a">
  <title>Kitchen by Rough Design</title>
  <link rel="icon" type="image/svg+xml" href="icons/kitchen-drawings.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <!-- apple-touch-icon: 180 is iPhone Plus default; 167 is iPad Pro
       12.9"; 152 is older iPad. iOS picks the closest match. -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <!-- style.css freshness. A plain <link> gives an instant first paint (may be
       the browser's cached copy, no FOUC); then a cache:'no-store' fetch injects
       the FRESH css AFTER it, so CSS edits always reach the device on a normal
       reload. Query-string busting (?v=) is a NO-OP at the Fastly CDN in front of
       GitHub Pages (proven 504f53a) — no-store is the only lever that works.
       style.css sits at the repo root next to index.html, so its relative
       url(fonts/…)/url(icons/…) resolve the same in the injected <style> as in
       the <link>. The injected <style> is later in source order → its rules win
       on equal specificity, so the fresh button colours etc. take effect. -->
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      window.__KD_CACHE_V = Math.floor(Date.now() / 60000);
      fetch('style.css', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.text() : null; })
        .then(function (css) {
          if (!css) return;
          var s = document.createElement('style');
          s.setAttribute('data-kd-fresh-css', '1');
          s.textContent = css;
          document.head.appendChild(s);
        })
        .catch(function () { /* keep the <link> copy */ });
    })();
  </script>
  <!-- Apply the saved theme BEFORE paint to avoid a flash. Default = dark
       (the base stylesheet), so workshop devices are unaffected unless a
       user picks another theme. (2026-05-30 theme system) -->
  <script>
    (function () {
      try {
        document.documentElement.setAttribute('data-theme', localStorage.getItem('kd_theme_v1') || 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <!-- One-row header (2026-05-28 layout shrink): brand · Back · Tabs
         · Search · date · Admin/Role badges all share .header-row's
         flex line. The .header-controls wrapper uses display:contents
         so its children participate directly in the parent flex
         (keeps the existing CSS selectors like .header-controls .tabs
         working without restyling). -->
    <div class="header-row">
      <h1><span class="brand-icon" aria-hidden="true"></span>Kitchen <span class="brand-sub">by Rough Design</span></h1>
      <div class="header-controls">
        <button id="header-back-btn" class="back-btn" aria-label="Back" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="tabs">
          <button id="tab-projects" class="tab active" data-view="projects">📋 Projects</button>
          <button id="tab-library"  class="tab"        data-view="library">📦 Library</button>
          <button id="tab-drawing"  class="tab"        data-view="drawing">📐 Drawing</button>
          <button id="tab-nest"     class="tab"        data-view="nest"><svg class="nest-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3.5" width="18" height="17" rx="1.5"/><rect x="5.5" y="6" width="6" height="5" rx="0.6"/><rect x="13" y="6" width="5.5" height="8.5" rx="0.6"/><rect x="5.5" y="13" width="7.5" height="5" rx="0.6"/></svg>Nest</button>
          <button id="tab-simbend"  class="tab"        data-view="simbend"><span class="icon-bend" aria-hidden="true"></span> Sim.Bending</button>
        </div>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button id="search-clear" type="button" aria-label="Clear">✕</button>
        </div>
      </div>
      <span id="updated" class="updated"></span>
      <button id="theme-btn" class="theme-btn" title="Theme" aria-label="Theme">🎨</button>
    </div>
  </header>

  <main id="root">
    <p class="loading">Loading…</p>
  </main>

  <footer>
    <span id="count"></span>
  </footer>

  <script src="config.js"></script>
  <script src="firebase-config.js"></script>
  <!-- Firebase Realtime Database (compat SDK from CDN) — shared metadata + comments. -->
  <!-- Storage SDK intentionally absent: this project is on the Spark plan -->
  <!-- and uploads route through the GitHub Contents API instead. -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <!-- Sortable.js — touch-friendly drag-and-drop for project reordering -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <!-- pdf-lib — client-side PDF merging for the "All PDF" button on
       each project (merges every part's drawing into one navigable PDF
       with a clickable link back to each part's spoke). -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- pdf.js - for rendering PDF pages to canvas (Level B visual pixel-diff) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window['pdfjs-dist/build/pdf']) {
      window.pdfjsLib = window['pdfjs-dist/build/pdf'];
    }
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <script>
    if (window.firebase && window.FIREBASE_CONFIG) {
      try {
        firebase.initializeApp(window.FIREBASE_CONFIG);
        window.firebaseDB = firebase.database();
      } catch (e) {
        console.warn('Firebase init failed:', e);
      }
    }
  </script>
  <!-- Theme picker: 🎨 header button -> menu of themes. Self-contained,
       independent of app.js render() (header is static), persists per
       device. Add a theme = one THEMES entry + a html[data-theme="x"]
       block in style.css. (2026-05-30) -->
  <script>
    (function () {
      var THEMES = [
        { id: 'dark',     label: 'Default - Dark' },
        { id: 'sketch',   label: 'Sketch - pencil' },
        { id: 'chalk',    label: 'Chalkboard - chalk' },
        { id: 'obsidian', label: 'Obsidian Gold - luxury' }
      ];
      var KEY = 'kd_theme_v1';
      function cur() { try { return localStorage.getItem(KEY) || 'dark'; } catch (e) { return 'dark'; } }
      function apply(id) {
        document.documentElement.setAttribute('data-theme', id);
        try { localStorage.setItem(KEY, id); } catch (e) {}
      }
      var btn = document.getElementById('theme-btn');
      if (!btn) return;
      var menu = null;
      function close() {
        if (menu) { menu.remove(); menu = null; document.removeEventListener('click', onDoc, true); }
      }
      function onDoc(e) { if (menu && !menu.contains(e.target) && e.target !== btn) close(); }
      function open() {
        close();
        var c = cur();
        menu = document.createElement('div');
        menu.className = 'theme-menu';
        THEMES.forEach(function (t) {
          var o = document.createElement('button');
          o.className = 'theme-opt' + (t.id === c ? ' is-active' : '');
          o.textContent = (t.id === c ? '✓ ' : ' ') + t.label;
          o.addEventListener('click', function () { apply(t.id); close(); });
          menu.appendChild(o);
        });
        document.body.appendChild(menu);
        var r = btn.getBoundingClientRect();
        menu.style.position = 'fixed';
        menu.style.top = (r.bottom + 6) + 'px';
        // Anchor the menu's LEFT edge to the button and clamp it inside the
        // viewport. The 🎨 button sits on the left of the header row, so the
        // old right-anchor (right = innerWidth - r.right) pushed the ~190px
        // menu off the left edge of the screen (เอ๋ 2026-06-01 'มองไม่เห็น
        // ในจอ'). offsetWidth is valid now the menu is in the DOM.
        var mw = menu.offsetWidth || 190;
        var left = Math.min(r.left, window.innerWidth - mw - 8);
        menu.style.left = Math.max(8, left) + 'px';
        setTimeout(function () { document.addEventListener('click', onDoc, true); }, 0);
      }
      btn.addEventListener('click', function (e) { e.stopPropagation(); if (menu) close(); else open(); });
    })();
  </script>
  <!-- app.js + nest.js cache-busted per-minute (shared bucket with
       style.css). nest.js loads BEFORE app.js so app.js can hand off
       to kdNest.openProject(projectKey) when the Nesting button is hit. -->
  <script>
    (function() {
      var v = window.__KD_CACHE_V || Math.floor(Date.now() / 60000);
      var names = ['nest.js', 'simbend-sim.js', 'simbend-3d.js', 'dxfFlat.js', 'simbend-3d-ai.js', 'tooling-catalog.js', 'tool-art.js', 'app.js', 'diff-geom.js', 'diff-tools.js', 'antigravity-inject.js'];
      // ROOT-CAUSE CACHE FIX (เอ๋ 2026-06-09): GitHub Pages serves the app shell with
      // Cache-Control: max-age=600 (10 min), and its Fastly CDN does NOT reliably honor
      // ?v= query cache-busting (a unique query was measured returning a cached HIT). So a
      // browser-cached OLD app.js kept showing stale data until a HARD reload — even though
      // the manifest fetch is already cache:'no-store'. FIX: fetch each app script with
      // cache:'no-store' too (deterministically bypasses the browser cache; the CDN is
      // purged on every Pages deploy → fresh) and inject in ARRAY ORDER. async=false-style
      // ordering is preserved by injecting sequentially (so diff-tools.js still runs AFTER
      // app.js, its _openSimilarCompareModal override winning). If a fetch fails, fall back
      // to a classic ordered <script src> so a network hiccup never breaks boot.
      function injectSrc(name) {
        return new Promise(function(res) {
          var s = document.createElement('script');
          s.src = name + '?v=' + v; s.async = false;
          s.onload = res; s.onerror = res;
          document.body.appendChild(s);
        });
      }
      Promise.all(names.map(function(name) {
        return fetch(name + '?v=' + v, { cache: 'no-store' })
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(function(code) { return { name: name, code: code }; })
          .catch(function() { return { name: name, code: null }; });   // null → use <script src> fallback
      })).then(function(loaded) {
        (function next(i) {
          if (i >= loaded.length) return;
          var it = loaded[i];
          if (it.code != null) {
            var s = document.createElement('script');
            s.textContent = it.code + '\n//# sourceURL=' + it.name;   // keep filename in devtools
            document.body.appendChild(s);   // inline script executes synchronously on append
            next(i + 1);
          } else {
            injectSrc(it.name).then(function() { next(i + 1); });
          }
        })(0);
      });
    })();
  </script>
</body>
</html>
