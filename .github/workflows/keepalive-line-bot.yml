# Keep-alive pinger for the Stainless Kitchen LINE bot (Render free tier).
#
# Render free web services spin down after ~15 min idle (cold start ~50s), which
# made the bot miss the first LINE message ("ไม่ตอบ"). This pings /api/health on a
# schedule to keep the instance warm so it answers instantly.
#
# Why this repo: it's PUBLIC (Actions minutes free/unlimited) and pushed daily
# (so GitHub won't auto-disable the schedule after 60 days idle), and it does NOT
# touch the bot's own repo — so no accidental Render redeploy.
#
# NOTE: GitHub scheduled crons can be delayed under load. For a customer-facing
# bot, cron-job.org / UptimeRobot (5-min, no jitter) is the more reliable primary;
# this Action is the free, zero-account baseline + doubles as an uptime monitor
# (a persistently red run = the bot is down).
name: keepalive-line-bot

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min (UTC); margin vs the 15-min spin-down + GH jitter
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keepalive-line-bot
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping LINE bot /api/health (wakes it if asleep)
        run: |
          URL="https://stainless-line-bot.onrender.com/api/health"
          code="000"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then echo "bot is warm ✓"; exit 0; fi
            sleep 20
          done
          echo "::warning::LINE bot health check failed (last code: $code)"
          exit 1
